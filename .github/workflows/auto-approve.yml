name: Auto Approve
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.actor == 'ibidathoillah'
    steps:
      - name: Auto Approve
        uses: hmarr/auto-approve-action@v4.0.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
